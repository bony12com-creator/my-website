<header>

<nav id="menu">
<a href="index.html">Home</a>

<section class="contact-hero">
  <h2>Get In Touch</h2>
  <p>We are here to help you find your dream car.</p>
</section>

<section class="contact-container">

  <div class="contact-info">
    <h3>Contact Information</h3>
    <p><strong>📍 Location:</strong> Dar es Salaam, Tanzania</p>
    <p><strong>📞 Phone:</strong> +255 700 000 000</p>
    <p><strong>📧 Email:</strong> info@autodrive.com</p>
    <p><strong>🕒 Working Hours:</strong> Mon - Sat (8AM - 6PM)</p>
  </div>

  <div class="contact-form">
    <h3>Send Us a Message</h3>

    <form onsubmit="return validateForm()">
      <input type="text" id="name" placeholder="Your Name">
      <input type="email" id="email" placeholder="Your Email">
      <textarea id="message" placeholder="Your Message"></textarea>
      <button type="submit">Send Message</button>
    </form>

  </div>

</section>

<script src="script.js"></script>
